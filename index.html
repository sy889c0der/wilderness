<!DOCTYPE html>
<html lang=\"en\">
<head>
<meta charset=\"UTF-8\">
<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">
<title>Wilderness v2 - Stable Forest</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #1a2f1a; }
canvas { display: block; }
#loading {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background: #1a2f1a;
    color: #8aad6a;
    font-family: Georgia, serif;
    font-size: 18px;
    letter-spacing: 4px;
}
#loading.hidden { display: none; }
#ui {
    position: fixed; inset: 0; pointer-events: none; z-index: 10;
}
#ui h1 {
    position: absolute; top: 40px; left: 40px;
    font-size: 36px; font-weight: 300; letter-spacing: 6px;
    color: rgba(255,255,255,0.9); font-family: Georgia, serif;
    text-shadow: 0 2px 20px rgba(0,0,0,0.6);
}
#ui .subtitle {
    position: absolute; top: 90px; left: 40px;
    font-size: 12px; letter-spacing: 3px;
    color: rgba(255,255,255,0.5); font-family: Georgia, serif;
}
#ui .hint {
    position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
    font-size: 11px; letter-spacing: 2px;
    color: rgba(255,255,255,0.4); font-family: Georgia, serif;
    text-align: center;
}
#ui .controls {
    position: absolute; bottom: 30px; right: 30px;
    font-size: 10px; letter-spacing: 1.5px;
    color: rgba(255,255,255,0.35); font-family: Georgia, serif;
    text-align: right; line-height: 1.8;
}
</style>
</head>
<body>
<div id=\"loading\">LOADING FOREST...</div>
<div id=\"ui\">
    <h1>WILDERNESS</h1>
    <div class=\"subtitle\">A Quiet Forest Experience</div>
    <div class=\"hint\">MOVE MOUSE TO PAN CAMERA</div>
    <div class=\"controls\">MOVE MOUSE OVER GROUND TO GROW GRASS<br>CLICK TO PLANT TREES</div>
</div>
<script src=\"https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js\"><\/script>
<script>
(function() {
    'use strict';
    
    console.log('[V2] Starting...');
    
    var scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    scene.fog = new THREE.Fog(0xa8d8a8, 30, 150);
    console.log('[V2] Scene created');
    
    var camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0, 10, 30);
    camera.lookAt(0, 0, 0);
    console.log('[V2] Camera created');
    
    var renderer = new THREE.WebGLRenderer({antialias: true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);
    console.log('[V2] Renderer created');
    
    var ambient = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambient);
    
    var sun = new THREE.DirectionalLight(0xfff5e0, 2.0);
    sun.position.set(20, 30, 10);
    sun.castShadow = true;
    sun.shadow.mapSize.width = 1024;
    sun.shadow.mapSize.height = 1024;
    sun.shadow.camera.near = 0.5;
    sun.shadow.camera.far = 100;
    sun.shadow.camera.left = -30;
    sun.shadow.camera.right = 30;
    sun.shadow.camera.top = 30;
    sun.shadow.camera.bottom = -30;
    scene.add(sun);
    console.log('[V2] Lights added');
    
    var groundGeo = new THREE.PlaneGeometry(200, 200);
    var groundMat = new THREE.MeshStandardMaterial({color: 0x3a6a2a, roughness: 0.9});
    var ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);
    console.log('[V2] Ground created');
    
    var trees = [];
    function createTree(x, z) {
        var group = new THREE.Group();
        var trunkGeo = new THREE.CylinderGeometry(0.3, 0.5, 4, 8);
        var trunkMat = new THREE.MeshStandardMaterial({color: 0x5a3a1a, roughness: 0.9});
        var trunk = new THREE.Mesh(trunkGeo, trunkMat);
        trunk.position.y = 2;
        trunk.castShadow = true;
        group.add(trunk);
        for (var i = 0; i < 3; i++) {
            var leafGeo = new THREE.ConeGeometry(2.5 - i*0.5, 3, 8);
            var leafMat = new THREE.MeshStandardMaterial({color: 0x2a5a1a, roughness: 0.8});
            var leaf = new THREE.Mesh(leafGeo, leafMat);
            leaf.position.y = 5 + i * 2;
            leaf.castShadow = true;
            group.add(leaf);
        }
        group.position.set(x, 0, z);
        scene.add(group);
        trees.push(group);
        return group;
    }
    
    for (var i = 0; i < 10; i++) {
        var angle = (i / 10) * Math.PI * 2;
        var radius = 8 + Math.random() * 15;
        var x = Math.cos(angle) * radius;
        var z = Math.sin(angle) * radius;
        createTree(x, z);
    }
    console.log('[V2] Trees created:', trees.length);
    
    var mouseX = 0, mouseY = 0;
    var targetX = 0, targetY = 0;
    
    document.addEventListener('mousemove', function(e) {
        mouseX = (e.clientX / window.innerWidth) * 2 - 1;
        mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
    });
    console.log('[V2] Mouse listeners added');
    
    window.addEventListener('resize', function() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
    console.log('[V2] Resize listener added');
    
    setTimeout(function() {
        document.getElementById('loading').classList.add('hidden');
        console.log('[V2] Loading hidden');
    }, 500);
    
    var clock = new THREE.Clock();
    function animate() {
        requestAnimationFrame(animate);
        var elapsed = clock.getElapsedTime();
        targetX += (mouseX * 5 - targetX) * 0.05;
        targetY += (10 + mouseY * 3 - targetY) * 0.05;
        camera.position.x += (targetX - camera.position.x) * 0.05;
        camera.position.y += (targetY - camera.position.y) * 0.05;
        camera.lookAt(0, 3, 0);
        for (var i = 0; i < trees.length; i++) {
            var tree = trees[i];
            tree.rotation.z = Math.sin(elapsed * 0.5 + i) * 0.02;
        }
        renderer.render(scene, camera);
    }
    
    console.log('[V2] Starting animation loop...');
    animate();
    console.log('[V2] === Forest scene is running! ===');
})();
<\/script>
</body>
</html>
