<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forest Scene</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
canvas { display: block; }
#loading {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, #1a2f1a 0%, #0a150a 100%);
    transition: opacity 0.8s ease;
}
#loading.hidden { opacity: 0; pointer-events: none; }
.loading-text {
    font-size: 18px; color: #8aad6a; letter-spacing: 4px;
    font-family: Georgia, serif;
}
#hint {
    position: fixed; bottom: 28px; left: 0; right: 0;
    text-align: center; font-size: 12px; letter-spacing: 2px;
    color: rgba(180,210,160,0.6); font-family: Georgia, serif;
    text-shadow: 0 1px 8px rgba(0,0,0,0.5);
    pointer-events: none; z-index: 10;
}
</style>
</head>
<body>

<div id="loading"><div class="loading-text">ENTERING WILDERNESS</div></div>
<div id="hint">MOVE YOUR MOUSE TO PAN THE CAMERA</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
    "use strict";

    console.log("[Forest] Script started.");

    var TREE_COUNT = 8;
    var FIREFLY_COUNT = 60;
    var WORLD_SIZE = 40;

    var scene, camera, renderer;
    var clock;
    var mouseX = 0, mouseY = 0;
    var trees = [];
    var fireflyPositions;
    var fireflyVelocities;

    console.log("[Forest] Step 1: Creating scene...");

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a150a);
    scene.fog = new THREE.FogExp2(0x0a150a, 0.035);
    console.log("[Forest] Scene created with fog.");

    console.log("[Forest] Step 2: Creating camera...");

    camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 4, 12);
    camera.lookAt(0, 0, 0);
    console.log("[Forest] Camera created.");

    console.log("[Forest] Step 3: Creating renderer...");

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.insertBefore(renderer.domElement, document.body.firstChild);
    console.log("[Forest] Renderer created and appended to DOM.");

    console.log("[Forest] Step 4: Adding lights...");

    var ambientLight = new THREE.AmbientLight(0x1a2a1a, 0.5);
    scene.add(ambientLight);

    var dirLight = new THREE.DirectionalLight(0xffeedd, 0.7);
    dirLight.position.set(10, 15, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 1024;
    dirLight.shadow.mapSize.height = 1024;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 50;
    dirLight.shadow.camera.left = -20;
    dirLight.shadow.camera.right = 20;
    dirLight.shadow.camera.top = 20;
    dirLight.shadow.camera.bottom = -20;
    scene.add(dirLight);

    var hemiLight = new THREE.HemisphereLight(0x3a5a3a, 0x1a1a0a, 0.3);
    scene.add(hemiLight);
    console.log("[Forest] Lights added.");

    console.log("[Forest] Step 5: Creating ground...");

    var groundGeo = new THREE.PlaneGeometry(WORLD_SIZE, WORLD_SIZE, 32, 32);

    var groundPos = groundGeo.attributes.position;
    for (var g = 0; g < groundPos.count; g++) {
        var gx = groundPos.getX(g);
        var gy = groundPos.getY(g);
        var gz = Math.sin(gx * 0.3) * Math.cos(gy * 0.3) * 0.3;
        groundPos.setZ(g, gz);
    }
    groundGeo.computeVertexNormals();

    var groundMat = new THREE.MeshStandardMaterial({
        color: 0x1a3a1a,
        roughness: 0.9,
        metalness: 0.0
    });
    var ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);
    console.log("[Forest] Ground created.");

    console.log("[Forest] Step 6: Creating trees...");

    var trunkMat = new THREE.MeshStandardMaterial({
        color: 0x4a3520,
        roughness: 0.9
    });

    var leafColors = [0x1a4a1a, 0x2a5a2a, 0x1a3a1a, 0x2a4a2a, 0x3a5a2a];

    for (var ti = 0; ti < TREE_COUNT; ti++) {
        var treeGroup = new THREE.Group();

        var angle = Math.random() * Math.PI * 2;
        var radius = 3 + Math.random() * 14;
        var tx = Math.cos(angle) * radius;
        var tz = Math.sin(angle) * radius;
        var treeHeight = 2 + Math.random() * 3;
        var trunkRadius = 0.1 + Math.random() * 0.1;

        var trunkGeo = new THREE.CylinderGeometry(trunkRadius * 0.7, trunkRadius, treeHeight, 6);
        var trunk = new THREE.Mesh(trunkGeo, trunkMat);
        trunk.position.y = treeHeight / 2;
        trunk.castShadow = true;
        treeGroup.add(trunk);

        var leafColor = leafColors[Math.floor(Math.random() * leafColors.length)];
        var leafMat = new THREE.MeshStandardMaterial({
            color: leafColor,
            roughness: 0.8
        });

        var numLayers = 2 + Math.floor(Math.random() * 2);
        for (var li = 0; li < numLayers; li++) {
            var layerY = treeHeight * 0.5 + li * (treeHeight * 0.25);
            var layerRadius = (1.2 - li * 0.3) * (0.8 + Math.random() * 0.4);
            var leafGeo = new THREE.ConeGeometry(layerRadius, treeHeight * 0.4, 6);
            var leaf = new THREE.Mesh(leafGeo, leafMat);
            leaf.position.y = layerY;
            leaf.castShadow = true;
            treeGroup.add(leaf);
        }

        treeGroup.position.set(tx, 0, tz);
        treeGroup.rotation.y = Math.random() * Math.PI * 2;
        scene.add(treeGroup);
        trees.push(treeGroup);
        console.log("[Forest] Tree " + ti + " placed at (" + tx.toFixed(1) + ", 0, " + tz.toFixed(1) + ")");
    }
    console.log("[Forest] Total trees:", trees.length);

    console.log("[Forest] Step 7: Creating fireflies...");

    fireflyPositions = new Float32Array(FIREFLY_COUNT * 3);
    fireflyVelocities = [];

    var fireflyMat = new THREE.PointsMaterial({
        color: 0xaaff66,
        size: 0.15,
        transparent: true,
        opacity: 0.8,
        sizeAttenuation: true
    });

    var fireflyGeo = new THREE.BufferGeometry();
    fireflyGeo.setAttribute("position", new THREE.BufferAttribute(fireflyPositions, 3));

    var fireflyPoints = new THREE.Points(fireflyGeo, fireflyMat);
    scene.add(fireflyPoints);

    for (var fi = 0; fi < FIREFLY_COUNT; fi++) {
        fireflyPositions[fi * 3] = (Math.random() - 0.5) * 30;
        fireflyPositions[fi * 3 + 1] = 1 + Math.random() * 4;
        fireflyPositions[fi * 3 + 2] = (Math.random() - 0.5) * 30;
        fireflyVelocities.push({
            x: (Math.random() - 0.5) * 0.01,
            y: (Math.random() - 0.5) * 0.005,
            z: (Math.random() - 0.5) * 0.01
        });
    }

    console.log("[Forest] Step 8: Setting up input handling...");

    window.addEventListener("mousemove", function(event) {
        mouseX = (event.clientX / window.innerWidth) * 2 - 1;
        mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
    });

    window.addEventListener("resize", function() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        console.log("[Forest] Window resized.");
    });

    console.log("[Forest] Step 9: Starting animation loop...");

    clock = new THREE.Clock();

    var loadingEl = document.getElementById("loading");
    if (loadingEl) {
        loadingEl.classList.add("hidden");
        console.log("[Forest] Loading screen hidden.");
    }

    function animate() {
        requestAnimationFrame(animate);

        var delta = clock.getDelta();
        var elapsed = clock.getElapsedTime();

        var targetX = mouseX * 5;
        var targetY = 4 + mouseY * 2;
        camera.position.x += (targetX - camera.position.x) * 0.02;
        camera.position.y += (targetY - camera.position.y) * 0.02;
        camera.lookAt(0, 1, 0);

        for (var i = 0; i < FIREFLY_COUNT; i++) {
            fireflyPositions[i * 3] += fireflyVelocities[i].x + Math.sin(elapsed + i) * 0.003;
            fireflyPositions[i * 3 + 1] += fireflyVelocities[i].y + Math.cos(elapsed * 0.7 + i) * 0.002;
            fireflyPositions[i * 3 + 2] += fireflyVelocities[i].z + Math.sin(elapsed * 0.5 + i * 0.5) * 0.003;

            if (fireflyPositions[i * 3 + 1] < 0.5) fireflyVelocities[i].y = Math.abs(fireflyVelocities[i].y);
            if (fireflyPositions[i * 3 + 1] > 6) fireflyVelocities[i].y = -Math.abs(fireflyVelocities[i].y);
            if (Math.abs(fireflyPositions[i * 3]) > 18) fireflyVelocities[i].x *= -1;
            if (Math.abs(fireflyPositions[i * 3 + 2]) > 18) fireflyVelocities[i].z *= -1;
        }
        fireflyGeo.attributes.position.needsUpdate = true;

        for (var t = 0; t < trees.length; t++) {
            trees[t].rotation.z = Math.sin(elapsed * 0.5 + t) * 0.01;
        }

        renderer.render(scene, camera);
    }

    animate();
    console.log("[Forest] Animation loop started!");

    window.addEventListener("error", function(event) {
        console.error("[Forest] Error:", event.message, "at", event.filename, ":", event.lineno);
    });

    console.log("[Forest] Initialization complete.");
})();
</script>

</body>
</html>
