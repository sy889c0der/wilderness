<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Wilderness</title>
<style>* { margin: 0; padding: 0; box-sizing: border-box; }
html,body { width: 100%; height: 100%; overflow: hidden; background: #0a0f0d; }
canvas { display: block; width: 100%; height: 100%; }
.ui { position: fixed; inset: 0; pointer-events: none; z-index: 10; }
.title { position: absolute; top: 40px; left: 48px; }
.title h1 { font-size: 48px; font-weight: 200; letter-spacing: 16px; color: rgba(255,255,255,0.85); text-transform: uppercase; font-family: Inter, Helvetica Neue, Arial, sans-serif; text-shadow: 0 2px 20px rgba(0,0,0,0.3); }
.title .line { width: 60px; height: 1px; background: rgba(255,255,255,0.4); margin-top: 12px; }
.title .sub { font-size: 11px; letter-spacing: 4px; color: rgba(255,255,255,0.5); text-transform: uppercase; margin-top: 8px; font-family: Inter, Helvetica Neue, Arial, sans-serif; }
.hint { position: absolute; bottom: 32px; left: 48px; font-size: 10px; letter-spacing: 3px; color: rgba(255,255,255,0.35); text-transform: uppercase; font-family: Inter, Helvetica Neue, Arial, sans-serif; }
</style></head><body>
<canvas id="c"></canvas>
<div class="ui"><div class="title"><h1>Wilderness</h1><div class="line"></div><span class="sub">Immersive Forest Scene</span></div><div class="hint">Move mouse over ground to grow moss</div></div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, groundY;
const mouse = { x: -1000, y: -1000 };
const particles = [];
const mossClusters = [];
let time = 0;
let lastMossTime = 0;
let mossTotal = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  groundY = H * 0.72;
}
resize();
window.addEventListener('resize', resize);
document.body.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

for (let i = 0; i < 40; i++) {
  particles.push({
    x: Math.random()*W, y: Math.random()*H,
    vx: (Math.random()-0.5)*0.5, vy: (Math.random()-0.5)*0.3,
    size: 1+Math.random()*2, life: Math.random()*200,
    maxLife: 200+Math.random()*300,
    type: 'firefly',
    phase: Math.random()*Math.PI*2
  });
}

const trees = [
  { fx: 0.20, fy: 0, h: 280, w: 18, s: 0 },
  { fx: 0.40, fy: 10, h: 320, w: 22, s: 1 },
  { fx: 0.55, fy: -5, h: 260, w: 15, s: 2 },
  { fx: 0.75, fy: 5, h: 300, w: 20, s: 3 },
  { fx: 0.90, fy: -10, h: 240, w: 14, s: 4 }
];

function drawTree(tree, ti, t) {
  const x = tree.fx * W;
  const baseY = groundY + tree.fy;
  const sway = Math.sin(t*0.5 + tree.s) * 3;
  const topX = x + sway;
  const topY = baseY - tree.h;

  const tg = ctx.createLinearGradient(x-tree.w/2, baseY, x+tree.w/2, topY);
  tg.addColorStop(0, '#2a1a0a');
  tg.addColorStop(0.5, '#4a3020');
  tg.addColorStop(1, '#3a2515');
  ctx.fillStyle = tg;
  ctx.beginPath();
  ctx.moveTo(x-tree.w/2, baseY);
  ctx.lineTo(topX-tree.w*0.3, topY);
  ctx.lineTo(topX+tree.w*0.3, topY);
  ctx.lineTo(x+tree.w/2, baseY);
  ctx.closePath(); ctx.fill();

  ctx.strokeStyle = 'rgba(20,10,5,0.3)'; ctx.lineWidth = 1;
  for (let b = 0; b < 8; b++) {
    const bt = b/8; const bx = x + Math.sin(b+ti)*tree.w*0.3;
    ctx.beginPath(); ctx.moveTo(bx, baseY-tree.h*bt);
    ctx.lineTo(bx+Math.sin(t+b)*2, baseY-tree.h*(bt+0.1)); ctx.stroke();
  }

  const bc = 5+ti;
  for (let br = 0; br < bc; br++) {
    const ba = -Math.PI/2 + (br-bc/2)*0.4;
    const bl = 40 + Math.random()*60;
    const bs = baseY - tree.h*(0.4+br*0.08);
    const beX = Math.cos(ba)*bl + x + sway*(bs-baseY)/(-tree.h);
    const beY = bs + Math.sin(ba)*bl;
    ctx.strokeStyle = '#3a2515'; ctx.lineWidth = Math.max(1, 3-br*0.3); ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(x+sway*0.5, bs);
    ctx.quadraticCurveTo((x+beX)/2+sway*0.3, (bs+beY)/2-10, beX, beY); ctx.stroke();

    if (br > 1) {
      const lg = ctx.createRadialGradient(beX, beY, 0, beX, beY, 30);
      lg.addColorStop(0, 'rgba(40,100,30,0.6)');
      lg.addColorStop(0.5, 'rgba(30,80,25,0.3)');
      lg.addColorStop(1, 'rgba(20,60,15,0)');
      ctx.fillStyle = lg; ctx.beginPath(); ctx.arc(beX, beY, 30, 0, Math.PI*2); ctx.fill();
    }
  }

  const cg = ctx.createRadialGradient(topX, topY-20, 10, topX, topY-20, 100);
  cg.addColorStop(0, 'rgba(50,120,40,0.7)');
  cg.addColorStop(0.4, 'rgba(35,90,30,0.5)');
  cg.addColorStop(0.7, 'rgba(25,70,20,0.3)');
  cg.addColorStop(1, 'rgba(20,50,15,0)');
  ctx.fillStyle = cg;
  ctx.beginPath(); ctx.ellipse(topX, topY-20, 80+Math.sin(t+ti)*5, 60+Math.cos(t+ti)*3, 0, 0, Math.PI*2); ctx.fill();

  for (let g = 0; g < 20; g++) {
    const gx = x + (g-10)*8 + Math.sin(g*0.5)*5;
    const gh = 10 + Math.sin(g+ti)*8;
    const gs = Math.sin(t*2+g)*5;
    ctx.strokeStyle = 'hsl(' + (100+Math.random()*20) + ',50%,' + (25+Math.random()*15) + '%)';
    ctx.lineWidth = 1.5; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(gx, baseY);
    ctx.quadraticCurveTo(gx+gs*0.5, baseY-gh*0.5, gx+gs, baseY-gh); ctx.stroke();
  }
}

function addMoss(px, py) {
  const cluster = { particles: [], born: time };
  for (let i = 0; i < 15; i++) {
    const angle = Math.random()*Math.PI*2; const dist = Math.random()*12;
    cluster.particles.push({
      x: px + Math.cos(angle)*dist, y: py + Math.sin(angle)*dist,
      size: 2+Math.random()*5,
      color: 'hsl(' + (95+Math.random()*30) + ', ' + (50+Math.random()*30) + '%, ' + (20+Math.random()*20) + '%)',
      alpha: 0.5+Math.random()*0.5
    });
  }
  mossClusters.push(cluster);
  mossTotal += 15;
}

function animate(ts) {
  requestAnimationFrame(animate);
  const dt = Math.min((ts - (animate.last || ts))/1000, 0.05);
  animate.last = ts;
  time += dt;
  const t = time;

  ctx.clearRect(0, 0, W, H);

  const sg = ctx.createLinearGradient(0, 0, 0, groundY);
  sg.addColorStop(0, '#1a3a5a');
  sg.addColorStop(0.4, '#3a6a8a');
  sg.addColorStop(0.7, '#6aaa8a');
  sg.addColorStop(1, '#8aba7a');
  ctx.fillStyle = sg; ctx.fillRect(0, 0, W, groundY+2);

  const sunG = ctx.createRadialGradient(W*0.7, groundY*0.3, 0, W*0.7, groundY*0.3, 200);
  sunG.addColorStop(0, 'rgba(255,240,200,0.4)');
  sunG.addColorStop(0.3, 'rgba(255,220,160,0.15)');
  sunG.addColorStop(1, 'rgba(255,220,160,0)');
  ctx.fillStyle = sunG; ctx.fillRect(0, 0, W, H);

  const gg = ctx.createLinearGradient(0, groundY, 0, H);
  gg.addColorStop(0, '#2a4a1a');
  gg.addColorStop(0.3, '#1a3a10');
  gg.addColorStop(1, '#0d1f08');
  ctx.fillStyle = gg; ctx.fillRect(0, groundY, W, H-groundY);

  ctx.strokeStyle = '#3a6a2a'; ctx.lineWidth = 2;
  ctx.beginPath();
  for (let x = 0; x <= W; x += 4) {
    const y = groundY + Math.sin(x*0.008+t*0.1)*5 + Math.sin(x*0.02)*2;
    x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.stroke();

  trees.forEach((tree, ti) => drawTree(tree, ti, t));

  for (let i = mossClusters.length - 1; i >= 0; i--) {
    const cluster = mossClusters[i];
    const age = t - cluster.born;
    if (age > 8) { mossClusters.splice(i, 1); continue; }
    const fadeIn = Math.min(1, age / 1.5);
    cluster.particles.forEach(p => {
      ctx.fillStyle = p.color; ctx.globalAlpha = p.alpha * fadeIn;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
    });
  }
  ctx.globalAlpha = 1;

  if (mouse.x > 0 && mouse.x < W && mouse.y > groundY - 50 && mouse.y < H) {
    if (t - lastMossTime > 0.08) {
      lastMossTime = t;
      addMoss(mouse.x, mouse.y);
    }
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life += dt * 60;
    p.x += p.vx + Math.sin(t + p.phase)*0.2;
    p.y += p.vy + Math.cos(t*0.5 + p.phase)*0.1;
    if (p.x < -20) p.x = W+20; if (p.x > W+20) p.x = -20;
    if (p.y < -20) p.y = H+20; if (p.y > H+20) p.y = -20;
    if (p.life > p.maxLife) { particles.splice(i, 1); continue; }
    const lr = p.life / p.maxLife;
    const fa = Math.min(1, lr*5);
    const fo = lr > 0.8 ? (1-lr)*5 : 1;
    const alpha = fa * fo;
    if (p.type === 'firefly') {
      const pulse = Math.sin(t*3+p.phase)*0.5+0.5;
      const g = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size*8);
      g.addColorStop(0, 'rgba(255,240,180,' + (alpha*(0.3+pulse*0.5)) + ')');
      g.addColorStop(0.5, 'rgba(255,240,180,' + (alpha*pulse*0.1) + ')');
      g.addColorStop(1, 'rgba(255,240,180,0)');
      ctx.fillStyle = g; ctx.beginPath(); ctx.arc(p.x,p.y,p.size*8,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,' + (alpha*0.8) + ')';
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size*0.5,0,Math.PI*2); ctx.fill();
    }
  }

  const vg = ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.8);
  vg.addColorStop(0, 'transparent');
  vg.addColorStop(1, 'rgba(0,0,0,0.4)');
  ctx.fillStyle = vg; ctx.fillRect(0,0,W,H);
}

animate(0);
</script>
</body>
</html>
