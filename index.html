<!DOCTYPE html>
<html lang=\"zh-CN\">
<head>
    <meta charset=\"UTF-8\">
    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">
    <title>Three.js Forest Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script src=\"https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js\"></script>
    <script>
    (function () {
        'use strict';

        console.log('[Init] === Starting forest scene ===');

        // ---- 1. 场景 ----
        var scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 50, 200);
        console.log('[Init] Scene created, background=#87CEEB, fog enabled');

        // ---- 2. 相机 ----
        var camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 40);
        camera.lookAt(0, 0, 0);
        console.log('[Init] Camera created at (0, 15, 40)');

        // ---- 3. 渲染器 ----
        var renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        console.log('[Init] Renderer created, shadow maps enabled');

        // ---- 4. 光照 ----
        var ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        console.log('[Init] AmbientLight added');

        var directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(20, 40, 20);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 1024;
        directionalLight.shadow.mapSize.height = 1024;
        scene.add(directionalLight);
        console.log('[Init] DirectionalLight added');

        // ---- 5. 地面 ----
        var groundGeo = new THREE.PlaneGeometry(200, 200);
        var groundMat = new THREE.MeshLambertMaterial({ color: 0x4a8c3f });
        var ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);
        console.log('[Init] Ground plane created');

        // ---- 6. 树木工厂 ----
        function createTree(x, z) {
            var treeGroup = new THREE.Group();

            // 树干
            var trunkGeo = new THREE.CylinderGeometry(0.4, 0.6, 4, 8);
            var trunkMat = new THREE.MeshLambertMaterial({ color: 0x8B4513 });
            var trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.position.y = 2;
            trunk.castShadow = true;
            treeGroup.add(trunk);

            // 树叶（三层圆锥）
            var leafColors = [0x228B22, 0x2d8f2d, 0x339933];
            var layers = [
                { radius: 3.0, height: 3.5, y: 5.5 },
                { radius: 2.4, height: 3.0, y: 7.5 },
                { radius: 1.6, height: 2.5, y: 9.2 }
            ];

            for (var i = 0; i < layers.length; i++) {
                var leafGeo = new THREE.ConeGeometry(layers[i].radius, layers[i].height, 8);
                var leafMat = new THREE.MeshLambertMaterial({ color: leafColors[i] });
                var leaf = new THREE.Mesh(leafGeo, leafMat);
                leaf.position.y = layers[i].y;
                leaf.castShadow = true;
                treeGroup.add(leaf);
            }

            treeGroup.position.set(x, 0, z);
            return treeGroup;
        }

        // ---- 7. 放置 5 棵树 ----
        var treePositions = [
            { x: -8, z: -5 },
            { x: 5, z: -10 },
            { x: -3, z: 8 },
            { x: 10, z: 3 },
            { x: -12, z: 2 }
        ];

        var trees = [];
        for (var t = 0; t < treePositions.length; t++) {
            var pos = treePositions[t];
            var tree = createTree(pos.x, pos.z);
            scene.add(tree);
            trees.push(tree);
            console.log('[Init] Tree placed at (' + pos.x + ', ' + pos.z + ')');
        }

        // ---- 8. 粒子效果 ----
        var particleCount = 200;
        var particleGeo = new THREE.BufferGeometry();
        var particlePositions = new Float32Array(particleCount * 3);
        for (var p = 0; p < particleCount; p++) {
            particlePositions[p * 3] = (Math.random() - 0.5) * 100;
            particlePositions[p * 3 + 1] = Math.random() * 30 + 1;
            particlePositions[p * 3 + 2] = (Math.random() - 0.5) * 100;
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        var particleMat = new THREE.PointsMaterial({ color: 0xffffaa, size: 0.3, transparent: true, opacity: 0.6 });
        var particles = new THREE.Points(particleGeo, particleMat);
        scene.add(particles);
        console.log('[Init] Particles created, count=' + particleCount);

        // ---- 9. 窗口自适应 ----
        window.addEventListener('resize', function () {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            console.log('[Resize] Updated camera and renderer');
        });

        // ---- 10. 动画循环 ----
        var clock = new THREE.Clock();
        console.log('[Init] Animation loop starting...');

        function animate() {
            requestAnimationFrame(animate);

            var elapsed = clock.getElapsedTime();

            // 树叶微微摇摆
            for (var i = 0; i < trees.length; i++) {
                trees[i].children.forEach(function (child, idx) {
                    if (idx > 0) { // 跳过树干(index 0)
                        child.rotation.z = Math.sin(elapsed * 0.8 + i * 0.5) * 0.03;
                    }
                });
            }

            // 粒子缓慢飘动
            var positions = particles.geometry.attributes.position.array;
            for (var j = 0; j < particleCount; j++) {
                positions[j * 3 + 1] += Math.sin(elapsed + j) * 0.005;
                if (positions[j * 3 + 1] > 32) {
                    positions[j * 3 + 1] = 1;
                }
            }
            particles.geometry.attributes.position.needsUpdate = true;

            renderer.render(scene, camera);
        }

        animate();
        console.log('[Init] === Forest scene is running! ===');
    })();
    </script>
</body>
</html>
