    function createSkyShader() {

    function buildTree(barkTex, height, radius, curve) {
        var group = new THREE.Group();
        group.userData.swayOffset = Math.random()*Math.PI*2;
        group.userData.swaySpeed = 0.3+Math.random()*0.4;
        group.userData.growthTarget = 0.7+Math.random()*0.6;
        group.userData.currentScale = 0;
        var barkMat = new THREE.MeshStandardMaterial({ map:barkTex, roughness:0.95, metalness:0, bumpMap:barkTex, bumpScale:0.02 });
        var segs=12, th=height*0.7;

        }

        trunkGeo.computeVertexNormals();
        var trunk = new THREE.Mesh(trunkGeo, barkMat);
        trunk.position.y = th*0.5;

        group.add(trunk);
        var rc = 3+Math.floor(Math.random()*3);
        for (var r=0; r<rc; r++) {
            var rl = radius*(1.5+Math.random()), rg = new THREE.CylinderGeometry(0.02, radius*0.4, rl, 6);

            root.rotation.x = Math.sin(ang)*1.2;
            root.castShadow = true;
            group.add(root);
        }

        for (var b=0; b<bc; b++) {
            var bh = th*(0.4+Math.random()*0.5), ba = (b/bc)*Math.PI*2+Math.random()*0.5, bl = 0.5+Math.random()*1.2;
            var bg = new THREE.CylinderGeometry(0.02, 0.06, bl, 6);
            var branch = new THREE.Mesh(bg, barkMat);
            branch.position.set(Math.cos(ba)*bl*0.4, bh+bl*0.3, Math.sin(ba)*bl*0.4);
            branch.rotation.z = Math.cos(ba)*0.8;
            branch.rotation.x = Math.sin(ba)*0.8;
            branch.castShadow = true;
            group.add(branch);
            var lc = 2+Math.floor(Math.random()*3);
            for (var l=0; l<lc; l++) {
                var ls = 0.3+Math.random()*0.5, lg = new THREE.IcosahedronGeometry(ls, 1);
                var lp = lg.attributes.position;
                for (var li=0; li<lp.count; li++) {
                    lp.setX(li, lp.getX(li)+(Math.random()-0.5)*0.15);
                    lp.setY(li, lp.getY(li)+(Math.random()-0.5)*0.15);
                    lp.setZ(li, lp.getZ(li)+(Math.random()-0.5)*0.15);

                lp.needsUpdate = true;
                lg.computeVertexNormals();
                var leaf = new THREE.Mesh(lg, leavesMat.clone());
                leaf.position.set(Math.cos(ba)*bl+(Math.random()-0.5)*0.5, bh+bl+(Math.random()-0.5)*0.3, Math.sin(ba)*bl+(Math.random()-0.5)*0.5);
                leaf.castShadow = true; leaf.receiveShadow = true;

    function createMouseGrass() {
        var group = new THREE.Group();
        var bladeGeo = new THREE.BufferGeometry();
        var verts = new Float32Array([-0.04,0,0, 0.04,0,0, 0.015,0.4,0, -0.015,0.4,0, -0.04,0,0, 0.04,0,0]);

            mouse.x = (e.clientX/window.innerWidth)*2-1;

            rc.ray.intersectPlane(plane, iPt);
            if (iPt) {
                for (var i=0; i<5; i++) {
                    var gx=iPt.x+(Math.random()-0.5)*2, gz=iPt.z+(Math.random()-0.5)*2;
                    var gy = Math.sin(gx*0.1)*Math.cos(gz*0.1)*1.5 + Math.sin(gx*0.3+1.0)*Math.cos(gz*0.2)*0.5;

                        mesh.position.set(gx,gy,gz);
                        mesh.rotation.y = Math.random()*Math.PI;
                        var s = 0.8+Math.random()*1.2;

                        group.add(mesh);

    function createGodRays() {
        var rays = [];
        for (var ri=0; ri<2; ri++) {
            var geo = new THREE.PlaneGeometry(20, 15, 1, 1);
            var alphas = new Float32Array(geo.attributes.position.count);
            for (var ai=0; ai<alphas.length; ai++) {
                var x = geo.attributes.position.getX(ai);
                alphas[ai] = 1.0 - Math.abs(x)/10.0;

            geo.setAttribute('alpha', new THREE.BufferAttribute(alphas,1));
            var mat = createGodRaysShader();
            var mesh = new THREE.Mesh(geo, mat);

            else { mesh.position.set(-3,6,-5); mesh.rotation.x=-0.2; mesh.rotation.z=0.3; }
            scene.add(mesh);
            rays.push(mesh);
        }
        return rays;
    }
    function createSunGlow() {
        var geo = new THREE.SphereGeometry(3, 16, 16);
        var mat = createSunGlowShader();
        var mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(10, 15, -40);
        scene.add(mesh);
        return mesh;
    }
    function animate() {
        if (!started) return;
        rafId = requestAnimationFrame(animate);
        var delta = clock.getDelta();
        elapsedTime += delta;
        var plane = new THREE.Plane(new THREE.Vector3(0,1,0),0);
        var iPt = new THREE.Vector3();
        raycaster.setFromCamera(mouseVec, camera);
        raycaster.ray.intersectPlane(plane, iPt);
        if (iPt) { camTarget.x = iPt.x*0.3; camTarget.z = 8 - iPt.z*0.1; }
        camCur.lerp(camTarget, 0.02);
        camera.position.copy(camCur);
        camera.lookAt(0, 1.5, 0);
        for (var ti=0; ti<trees.length; ti++) {
            var tree = trees[ti];
            var gt = (elapsedTime*1000 - ti*TREE_GROWTH_STAGGER)/GROWTH_DURATION;
            if (gt<0) gt=0; if (gt>1) gt=1;
            var s = 1 - Math.pow(1-gt, 3);
            var target = tree.userData.growthTarget;
            var sc = target * s;
            tree.scale.set(sc, sc, sc);
        }
        for (var si=0; si<trees.length; si++) {
            var st = trees[si];
            var off = st.userData.swayOffset, spd = st.userData.swaySpeed;
            st.rotation.z = Math.sin(elapsedTime*spd+off)*0.015;
            st.rotation.x = Math.sin(elapsedTime*spd*0.7+off+1.0)*0.01;
        }
        skyMat.uniforms.uTime.value = elapsedTime;
        sunGlowMat.uniforms.uTime.value = elapsedTime;
        sunGlowMat.uniforms.uViewPos.value.copy(camera.position);
        sunGlowMesh.lookAt(camera.position);
        for (var gi=0; gi<godRays.length; gi++) {
            godRays[gi].material.uniforms.uTime.value = elapsedTime;
        }
        var toRemove = [];
        for (var gi2=0; gi2<growingGrass.length; gi2++) {
            var g = growingGrass[gi2];
            var age = elapsedTime - g.born;
            var fadeIn = Math.min(age/g.duration, 1.0);
            g.mesh.material.opacity = fadeIn;
            g.mesh.material.transparent = true;
            g.mesh.rotation.z = Math.sin(elapsedTime*1.5+g.mesh.position.x)*0.05;
            if (fadeIn>=1.0 && age>30) toRemove.push(gi2);
        }
        for (var ri=toRemove.length-1; ri>=0; ri--) {
            var idx = toRemove[ri];
            if (growingGrass[idx]) {
                growingGrass[idx].mesh.geometry.dispose();
                growingGrass[idx].mesh.material.dispose();
                mouseGrassGroup.remove(growingGrass[idx].mesh);
                growingGrass.splice(idx, 1);
            }
        }
        renderer.render(scene, camera);
    }
    function init() {
        scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0a1a0a, 0.025);
        camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 100);
        camera.position.set(0, 3, 8);
        renderer = new THREE.WebGLRenderer({antialias:true, alpha:false});
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 0.8;
        document.body.insertBefore(renderer.domElement, document.body.firstChild);
        clock = new THREE.Clock();
        var ambientLight = new THREE.AmbientLight(0x1a2a1a, 0.4);
        scene.add(ambientLight);
        var dirLight = new THREE.DirectionalLight(0xffeedd, 0.8);
        dirLight.position.set(10, 15, -10);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 50;
        dirLight.shadow.camera.left = -20;
        dirLight.shadow.camera.right = 20;
        dirLight.shadow.camera.top = 20;
        dirLight.shadow.camera.bottom = -20;
        scene.add(dirLight);
        var hemiLight = new THREE.HemisphereLight(0x3a5a3a, 0x1a1a0a, 0.3);
        scene.add(hemiLight);
        var pointLight1 = new THREE.PointLight(0x44aa44, 0.3, 15);
        pointLight1.position.set(5, 3, -5);
        scene.add(pointLight1);
        var pointLight2 = new THREE.PointLight(0x88aa44, 0.2, 12);
        pointLight2.position.set(-4, 2, -3);
        scene.add(pointLight2);
        skyMat = createSkyShader();
        var skyGeo = new THREE.SphereGeometry(80, 32, 32);
        skyMesh = new THREE.Mesh(skyGeo, skyMat);
        scene.add(skyMesh);
        sunGlowMat = createSunGlowShader();
        sunGlowMesh = createSunGlow();
        terrainMesh = createTerrain();
        terrainGeo = terrainMesh.geometry;
        grassInstanced = createInstancedGrass();
        var barkTex = createBarkTexture();
        for (var i=0; i<TREE_COUNT; i++) {
            var tree = buildTree(barkTex, 4+Math.random()*3, 0.15+Math.random()*0.15, 0.3+Math.random()*0.5);
            var tx=(Math.random()-0.5)*25, tz=(Math.random()-0.5)*25-5;
            if (Math.abs(tx)<3 && Math.abs(tz+5)<3) tx+=5;
            var ty = Math.sin(tx*0.1)*Math.cos(tz*0.1)*1.5 + Math.sin(tx*0.3+1.0)*Math.cos(tz*0.2)*0.5;
            tree.position.set(tx, ty, tz);
            tree.rotation.y = Math.random()*Math.PI*2;
            scene.add(tree);
            trees.push(tree);
        }
        godRays = createGodRays();
        fireflies = createFireflies();
        dustParticles = createDust();
        mouseGrassGroup = createMouseGrass();
        raycaster = new THREE.Raycaster();
        mouseVec = new THREE.Vector2();
        mousePlane = new THREE.Plane(new THREE.Vector3(0,1,0),0);
        window.addEventListener('mousemove', function(e) {
            mouseVec.x = (e.clientX/window.innerWidth)*2-1;
            mouseVec.y = -(e.clientY/window.innerHeight)*2+1;
        });
        window.addEventListener('resize', onResize);
        setTimeout(function() {
            var loadingEl = document.getElementById('loading');
            if (loadingEl) loadingEl.classList.add('hidden');
            if (!started) { started=true; animate(); }
        }, 800);
    }
    function onResize() {
        camera.aspect = window.innerWidth/window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();

<\/script>
</body>
</html>
