<!DOCTYPE html>
<html lang=\"en\">
<head>
<meta charset=\"UTF-8\">
<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">
<title>Wilderness v2 - Enhanced Forest</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #1a2a1a; font-family: 'Courier New', monospace; }
canvas { display: block; width: 100vw; height: 100vh; }
#loading {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: #0f1a0f; display: flex; flex-direction: column;
  align-items: center; justify-content: center; z-index: 100;
  transition: opacity 1.5s ease;
}
#loading.hidden { opacity: 0; pointer-events: none; }
#loading h1 { color: #5a8a5a; font-size: 2em; letter-spacing: 8px; margin-bottom: 15px; }
#loading p { color: #3a6a3a; font-size: 12px; letter-spacing: 3px; margin-bottom: 30px; }
#load-bar-outer { width: 200px; height: 2px; background: #1a2a1a; border-radius: 1px; }
#load-bar-inner { width: 0%; height: 100%; background: #4a8a4a; border-radius: 1px; transition: width 0.3s; }
#ui-title {
  position: fixed; top: 25px; left: 25px; z-index: 10; color: #7aaa7a;
  font-size: 16px; letter-spacing: 6px; opacity: 0.8;
  text-shadow: 0 0 20px rgba(122,170,122,0.4);
}
#ui-subtitle {
  position: fixed; top: 50px; left: 25px; z-index: 10; color: #5a8a5a;
  font-size: 11px; letter-spacing: 3px; opacity: 0.5;
}
#ui-hints {
  position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
  z-index: 10; color: #5a8a5a; font-size: 11px; letter-spacing: 2px;
  opacity: 0.6; text-align: center; line-height: 1.8;
}
</style>
</head>
<body>
<div id=\"loading\">
  <h1>WILDERNESS</h1>
  <p>ENHANCED FOREST</p>
  <div id=\"load-bar-outer\"><div id=\"load-bar-inner\"></div></div>
</div>
<div id=\"ui-title\">WILDERNESS</div>
<div id=\"ui-subtitle\">ENHANCED FOREST</div>
<div id=\"ui-hints\">MOVE MOUSE TO EXPLORE<br>CLICK GROUND TO PLANT TREES</div>
<script src=\"https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js\"></script>
<script>
(function() {
  'use strict';
  console.log('[Version B] Script started');

  // --- Loading ---
  const loadBar = document.getElementById('load-bar-inner');
  const loadingEl = document.getElementById('loading');
  function setLoad(pct) { loadBar.style.width = pct + '%'; }

  // --- Scene ---
  console.log('[Version B] Creating scene');
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a3a2a);
  scene.fog = new THREE.FogExp2(0x2a4a3a, 0.012);
  console.log('[Version B] Scene created');

  // --- Camera ---
  console.log('[Version B] Creating camera');
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 300);
  camera.position.set(0, 5, 25);
  camera.lookAt(0, 3, 0);
  console.log('[Version B] Camera created');

  // --- Renderer ---
  console.log('[Version B] Creating renderer');
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = false;
  document.body.appendChild(renderer.domElement);
  console.log('[Version B] Renderer created');

  setLoad(10);

  // --- Lighting System ---
  console.log('[Version B] Adding lighting system');
  const hemiLight = new THREE.HemisphereLight(0x88bb88, 0x224422, 0.6);
  scene.add(hemiLight);
  console.log('[Version B] Hemisphere light added');

  const dirLight = new THREE.DirectionalLight(0xffeedd, 0.7);
  dirLight.position.set(10, 20, 10);
  scene.add(dirLight);
  console.log('[Version B] Directional light added');

  const ambientLight = new THREE.AmbientLight(0x44aa44, 0.3);
  scene.add(ambientLight);
  console.log('[Version B] Ambient light added');

  const sunGlow = new THREE.PointLight(0xffeebb, 0.8, 50);
  sunGlow.position.set(10, 20, 10);
  scene.add(sunGlow);
  console.log('[Version B] Sun glow point light added');

  setLoad(20);

  // --- Terrain (undulating ground) ---
  console.log('[Version B] Creating terrain');
  const terrainSize = 120;
  const terrainSeg = 40;
  const terrainGeo = new THREE.PlaneGeometry(terrainSize, terrainSize, terrainSeg, terrainSeg);
  const terrainVerts = terrainGeo.attributes.position.array;
  for (let i = 0; i < terrainVerts.length; i += 3) {
    const x = terrainVerts[i];
    const y = terrainVerts[i + 1];
    terrainVerts[i + 2] = Math.sin(x * 0.05) * Math.cos(y * 0.05) * 1.5
      + Math.sin(x * 0.1 + 1) * 0.5
      + Math.cos(y * 0.08 + 2) * 0.8;
  }
  terrainGeo.computeVertexNormals();
  const terrainMat = new THREE.MeshPhongMaterial({
    color: 0x2a5a2a,
    specular: 0x111111,
    shininess: 10,
    flatShading: true
  });
  const terrain = new THREE.Mesh(terrainGeo, terrainMat);
  terrain.rotation.x = -Math.PI / 2;
  terrain.position.y = -1;
  scene.add(terrain);
  console.log('[Version B] Terrain created');

  setLoad(30);

  // --- Grass patches (500 blades) ---
  console.log('[Version B] Creating grass');
  const grassCount = 500;
  const grassGroup = new THREE.Group();
  for (let i = 0; i < grassCount; i++) {
    const bladeGeo = new THREE.PlaneGeometry(0.08, rng(0.4, 1.0));
    const greenVar = 0x1a + Math.floor(Math.random() * 0x20);
    const bladeMat = new THREE.MeshPhongMaterial({
      color: new THREE.Color(greenVar, greenVar + 0x30, greenVar),
      side: THREE.DoubleSide,
      specular: 0x000000,
      shininess: 1
    });
    const blade = new THREE.Mesh(bladeGeo, bladeMat);
    blade.position.set(rng(-30, 30), rng(-0.3, 0.5), rng(-30, 30));
    blade.rotation.y = Math.random() * Math.PI;
    blade.rotation.z = rng(-0.15, 0.15);
    grassGroup.add(blade);
  }
  scene.add(grassGroup);
  console.log('[Version B] Grass created:', grassCount, 'blades');

  setLoad(40);

  // --- Trees ---
  console.log('[Version B] Creating trees');
  const trees = [];
  const plantedTrees = [];

  function rng(min, max) { return min + Math.random() * (max - min); }

  function createTree(x, z, scale, treeType) {
    const group = new THREE.Group();
    const trunkH = rng(2, 4) * scale;
    const trunkR = 0.1 * scale;

    // Trunk
    const trunkGeo = new THREE.CylinderGeometry(trunkR * 0.6, trunkR, trunkH, 6);
    const trunkMat = new THREE.MeshPhongMaterial({ color: 0x3a2a1a, specular: 0x000000, shininess: 1 });
    const trunk = new THREE.Mesh(trunkGeo, trunkMat);
    trunk.position.y = trunkH / 2 - 1;
    group.add(trunk);

    if (treeType === 0) {
      // Pine/conifer style
      const layers = Math.floor(rng(3, 5));
      for (let i = 0; i < layers; i++) {
        const coneH = rng(1.0, 1.8) * scale;
        const coneR = rng(0.6, 1.2) * scale * (1 - i * 0.12);
        const coneGeo = new THREE.ConeGeometry(coneR, coneH, 7);
        const gv = 0x15 + Math.floor(Math.random() * 0x25);
        const coneMat = new THREE.MeshPhongMaterial({
          color: new THREE.Color(gv * 0.3, gv + 0x20, gv * 0.2),
          specular: 0x000000, shininess: 2
        });
        const cone = new THREE.Mesh(coneGeo, coneMat);
        cone.position.y = trunkH + i * coneH * 0.45;
        group.add(cone);
      }
    } else if (treeType === 1) {
      // Round canopy
      const canopyR = rng(1.2, 2.0) * scale;
      const canopyGeo = new THREE.SphereGeometry(canopyR, 8, 6);
      const gv = 0x20 + Math.floor(Math.random() * 0x20);
      const canopyMat = new THREE.MeshPhongMaterial({
        color: new THREE.Color(gv * 0.4, gv + 0x25, gv * 0.3),
        specular: 0x000000, shininess: 3
      });
      const canopy = new THREE.Mesh(canopyGeo, canopyMat);
      canopy.position.y = trunkH + canopyR * 0.5;
      group.add(canopy);
    } else {
      // Birch-like thin tree
      const trunkR2 = 0.06 * scale;
      const trunkGeo2 = new THREE.CylinderGeometry(trunkR2, trunkR2 * 1.3, trunkH * 1.3, 5);
      const trunkMat2 = new THREE.MeshPhongMaterial({ color: 0x8a8070, specular: 0x000000, shininess: 2 });
      const trunk2 = new THREE.Mesh(trunkGeo2, trunkMat2);
      trunk2.position.y = trunkH * 0.65 - 1;
      group.remove(trunk);
      group.add(trunk2);

      const leafCount = Math.floor(rng(3, 6));
      for (let i = 0; i < leafCount; i++) {
        const lGeo = new THREE.SphereGeometry(rng(0.3, 0.7) * scale, 5, 4);
        const gv = 0x25 + Math.floor(Math.random() * 0x20);
        const lMat = new THREE.MeshPhongMaterial({
          color: new THREE.Color(gv * 0.3, gv + 0x20, gv * 0.2),
          specular: 0x000000, shininess: 1
        });
        const leaf = new THREE.Mesh(lGeo, lMat);
        leaf.position.set(rng(-0.5, 0.5) * scale, trunkH * 0.7 + i * 0.5 * scale, rng(-0.5, 0.5) * scale);
        group.add(leaf);
      }
    }

    group.position.set(x, 0, z);
    group.rotation.y = rng(0, Math.PI * 2);
    scene.add(group);
    trees.push({ group: group, type: treeType, swayPhase: rng(0, Math.PI * 2), swaySpeed: rng(0.3, 0.8) });
    return group;
  }

  // Place 12 initial trees
  const treeTypes = [0, 1, 2];
  for (let i = 0; i < 12; i++) {
    const angle = rng(0, Math.PI * 2);
    const dist = rng(3, 25);
    const x = Math.cos(angle) * dist;
    const z = Math.sin(angle) * dist - 3;
    const scale = rng(0.6, 1.4);
    const type = treeTypes[Math.floor(Math.random() * 3)];
    createTree(x, z, scale, type);
    console.log('[Version B] Tree', i, 'placed at', x.toFixed(1), z.toFixed(1), 'type:', type, 'scale:', scale.toFixed(2));
  }
  setLoad(55);

  // --- Small plants (flowers, mushrooms, bushes) ---
  console.log('[Version B] Creating small plants');
  const plantCount = 40;
  for (let i = 0; i < plantCount; i++) {
    const px = rng(-25, 25);
    const pz = rng(-25, 25);
    const plantType = Math.floor(Math.random() * 3);
    let plantMesh;

    if (plantType === 0) {
      // Mushroom
      const mushGroup = new THREE.Group();
      const stemGeo = new THREE.CylinderGeometry(0.03, 0.04, 0.15, 5);
      const stemMat = new THREE.MeshPhongMaterial({ color: 0xddddbb, specular: 0x000000, shininess: 1 });
      const stem = new THREE.Mesh(stemGeo, stemMat);
      stem.position.y = 0.075;
      mushGroup.add(stem);
      const capGeo = new THREE.SphereGeometry(0.08, 6, 4, 0, Math.PI * 2, 0, Math.PI / 2);
      const capMat = new THREE.MeshPhongMaterial({
        color: new THREE.Color(0.6 + Math.random() * 0.3, 0.1, 0.1),
        specular: 0x000000, shininess: 5
      });
      const cap = new THREE.Mesh(capGeo, capMat);
      cap.position.y = 0.15;
      mushGroup.add(cap);
      plantMesh = mushGroup;
    } else if (plantType === 1) {
      // Flower
      const flwGroup = new THREE.Group();
      const stemGeo = new THREE.CylinderGeometry(0.015, 0.02, 0.3, 4);
      const stemMat = new THREE.MeshPhongMaterial({ color: 0x2a6a2a, specular: 0x000000, shininess: 1 });
      const stem = new THREE.Mesh(stemGeo, stemMat);
      stem.position.y = 0.15;
      flwGroup.add(stem);
      const petalGeo = new THREE.SphereGeometry(0.05, 5, 4);
      const petalColors = [0xff6688, 0xffaa44, 0xff44aa, 0xaabbff, 0xffff66];
      const petalMat = new THREE.MeshPhongMaterial({
        color: petalColors[Math.floor(Math.random() * petalColors.length)],
        specular: 0x000000, shininess: 2
      });
      const petal = new THREE.Mesh(petalGeo, petalMat);
      petal.position.y = 0.3;
      petal.scale.set(1, 0.5, 1);
      flwGroup.add(petal);
      plantMesh = flwGroup;
    } else {
      // Bush
      const bushGroup = new THREE.Group();
      const bushGeo = new THREE.SphereGeometry(rng(0.15, 0.35), 6, 5);
      const gv = 0x1a + Math.floor(Math.random() * 0x15);
      const bushMat = new THREE.MeshPhongMaterial({
        color: new THREE.Color(gv * 0.3, gv + 0x20, gv * 0.2),
        specular: 0x000000, shininess: 1
      });
      const bush = new THREE.Mesh(bushGeo, bushMat);
      bush.position.y = 0.15;
      bushGroup.add(bush);
      plantMesh = bushGroup;
    }

    plantMesh.position.set(px, 0, pz);
    scene.add(plantMesh);
  }
  console.log('[Version B] Plants created:', plantCount);
  setLoad(65);

  // --- Volumetric light rays (simulated with semi-transparent planes) ---
  console.log('[Version B] Creating volumetric light rays');
  const rayCount = 5;
  for (let i = 0; i < rayCount; i++) {
    const rayGeo = new THREE.PlaneGeometry(rng(2, 5), rng(10, 18));
    const rayMat = new THREE.MeshBasicMaterial({
      color: 0xeeffcc,
      transparent: true,
      opacity: 0.03 + Math.random() * 0.03,
      side: THREE.DoubleSide,
      depthWrite: false,
      blending: THREE.AdditiveBlending
    });
    const ray = new THREE.Mesh(rayGeo, rayMat);
    ray.position.set(rng(-8, 8), 5, rng(-5, 10));
    ray.rotation.z = rng(-0.2, 0.2);
    ray.rotation.y = rng(-0.3, 0.3);
    scene.add(ray);
  }
  console.log('[Version B] Volumetric rays created');

  setLoad(70);

  // --- Fireflies (200) ---
  console.log('[Version B] Creating fireflies');
  const ffCount = 200;
  const ffGeo = new THREE.BufferGeometry();
  const ffPos = new Float32Array(ffCount * 3);
  const ffCol = new Float32Array(ffCount * 3);
  const ffSz = new Float32Array(ffCount);
  const ffData = [];

  for (let i = 0; i < ffCount; i++) {
    ffPos[i * 3] = rng(-20, 20);
    ffPos[i * 3 + 1] = rng(0.5, 6);
    ffPos[i * 3 + 2] = rng(-20, 20);

    const r = 0.3 + Math.random() * 0.5;
    const g = 0.5 + Math.random() * 0.5;
    const b = 0.1 + Math.random() * 0.2;
    ffCol[i * 3] = r;
    ffCol[i * 3 + 1] = g;
    ffCol[i * 3 + 2] = b;
    ffSz[i] = rng(2, 6);

    ffData.push({
      bx: ffPos[i * 3], by: ffPos[i * 3 + 1], bz: ffPos[i * 3 + 2],
      phase: rng(0, Math.PI * 2),
      speed: rng(0.2, 0.9),
      radius: rng(0.3, 1.8),
      ySpeed: rng(0.2, 0.7)
    });
  }

  ffGeo.setAttribute('position', new THREE.BufferAttribute(ffPos, 3));
  ffGeo.setAttribute('color', new THREE.BufferAttribute(ffCol, 3));
  ffGeo.setAttribute('size', new THREE.BufferAttribute(ffSz, 1));

  const ffVertShader = 
    attribute float size;
    varying vec3 vColor;
    void main() {
      vColor = color;
      vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
      gl_PointSize = size * (250.0 / -mvPos.z);
      gl_Position = projectionMatrix * mvPos;
    }
  ;
  const ffFragShader = 
    varying vec3 vColor;
    void main() {
      float d = length(gl_PointCoord - vec2(0.5));
      if (d > 0.5) discard;
      float alpha = smoothstep(0.5, 0.0, d);
      gl_FragColor = vec4(vColor, alpha * 0.9);
    }
  ;

  const ffMat = new THREE.ShaderMaterial({
    vertexShader: ffVertShader,
    fragmentShader: ffFragShader,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    vertexColors: true
  });

  const fireflies = new THREE.Points(ffGeo, ffMat);
  scene.add(fireflies);
  console.log('[Version B] Fireflies created:', ffCount);

  setLoad(80);

  // --- Dust particles (300) ---
  console.log('[Version B] Creating dust particles');
  const dustCount = 300;
  const dustGeo = new THREE.BufferGeometry();
  const dustPos = new Float32Array(dustCount * 3);
  const dustSz = new Float32Array(dustCount);
  const dustData = [];

  for (let i = 0; i < dustCount; i++) {
    dustPos[i * 3] = rng(-25, 25);
    dustPos[i * 3 + 1] = rng(0, 10);
    dustPos[i * 3 + 2] = rng(-25, 25);
    dustSz[i] = rng(1, 3);
    dustData.push({
      bx: dustPos[i * 3], by: dustPos[i * 3 + 1], bz: dustPos[i * 3 + 2],
      phase: rng(0, Math.PI * 2),
      speed: rng(0.1, 0.5),
      drift: rng(0.1, 0.8)
    });
  }

  dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
  dustGeo.setAttribute('size', new THREE.BufferAttribute(dustSz, 1));

  const dustVertShader = 
    attribute float size;
    void main() {
      vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
      gl_PointSize = size * (200.0 / -mvPos.z);
      gl_Position = projectionMatrix * mvPos;
    }
  ;
  const dustFragShader = 
    void main() {
      float d = length(gl_PointCoord - vec2(0.5));
      if (d > 0.5) discard;
      float alpha = smoothstep(0.5, 0.0, d) * 0.3;
      gl_FragColor = vec4(0.9, 0.95, 0.8, alpha);
    }
  ;

  const dustMat = new THREE.ShaderMaterial({
    vertexShader: dustVertShader,
    fragmentShader: dustFragShader,
    transparent: true,
    depthWrite: false
  });

  const dustParticles = new THREE.Points(dustGeo, dustMat);
  scene.add(dustParticles);
  console.log('[Version B] Dust particles created:', dustCount);

  setLoad(95);

  // --- Mouse Parallax ---
  console.log('[Version B] Setting up mouse parallax');
  let mouseX = 0, mouseY = 0;
  let targetCamX = 0, targetCamY = 5;

  window.addEventListener('mousemove', function(e) {
    mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
    mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
    targetCamX = mouseX * 5;
    targetCamY = 5 - mouseY * 3;
  });
  console.log('[Version B] Mouse listener added');

  // --- Click to plant trees ---
  console.log('[Version B] Setting up click interaction');
  const raycaster = new THREE.Raycaster();
  const mouseVec = new THREE.Vector2();
  const treeTypes = [0, 1, 2];

  window.addEventListener('click', function(e) {
    mouseVec.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouseVec.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouseVec, camera);

    const intersects = raycaster.intersectObject(terrain);
    if (intersects.length > 0) {
      const point = intersects[0].point;
      const scale = rng(0.5, 1.0);
      const type = treeTypes[Math.floor(Math.random() * 3)];
      createTree(point.x, point.z, scale, type);
      plantedTrees.push(trees[trees.length - 1]);
      console.log('[Version B] Tree planted at', point.x.toFixed(1), point.z.toFixed(1));
    }
  });
  console.log('[Version B] Click listener added');

  // --- Resize ---
  window.addEventListener('resize', function() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // --- Hide loading ---
  setTimeout(function() {
    loadingEl.classList.add('hidden');
    console.log('[Version B] Loading hidden');
  }, 600);

  // --- Animation loop ---
  console.log('[Version B] Starting animation loop');
  let time = 0;

  function animate() {
    requestAnimationFrame(animate);
    time += 0.016;

    // Camera parallax
    camera.position.x += (targetCamX - camera.position.x) * 0.02;
    camera.position.y += (targetCamY - camera.position.y) * 0.02;
    camera.lookAt(0, 3, 0);

    // Tree sway
    for (let i = 0; i < trees.length; i++) {
      const t = trees[i];
      t.group.rotation.z = Math.sin(time * t.swaySpeed + t.swayPhase) * 0.015;
      t.group.rotation.x = Math.cos(time * t.swaySpeed * 0.7 + t.swayPhase) * 0.008;
    }

    // Grass sway
    for (let i = 0; i < grassGroup.children.length; i++) {
      const blade = grassGroup.children[i];
      blade.rotation.z = Math.sin(time * 1.5 + i * 0.3) * 0.08;
    }

    // Animate fireflies
    const ffArr = ffGeo.attributes.position.array;
    for (let i = 0; i < ffCount; i++) {
      const d = ffData[i];
      ffArr[i * 3] = d.bx + Math.sin(time * d.speed + d.phase) * d.radius;
      ffArr[i * 3 + 1] = d.by + Math.sin(time * d.ySpeed + d.phase) * 0.8;
      ffArr[i * 3 + 2] = d.bz + Math.cos(time * d.speed * 0.7 + d.phase) * d.radius;
    }
    ffGeo.attributes.position.needsUpdate = true;

    // Animate dust
    const dustArr = dustGeo.attributes.position.array;
    for (let i = 0; i < dustCount; i++) {
      const d = dustData[i];
      dustArr[i * 3] = d.bx + Math.sin(time * d.speed + d.phase) * d.drift;
      dustArr[i * 3 + 1] = d.by + Math.cos(time * d.speed * 0.5 + d.phase) * 0.5;
      dustArr[i * 3 + 2] = d.bz + Math.cos(time * d.speed * 0.3 + d.phase) * d.drift;
    }
    dustGeo.attributes.position.needsUpdate = true;

    // Slow fog particle rotation
    dustParticles.rotation.y = time * 0.003;

    renderer.render(scene, camera);
  }

  console.log('[Version B] Animation loop started');
  animate();
  console.log('[Version B] All done!');
})();
</script>
</body>
</html>
